<!DOCTYPE html>
<html lang="en">
    <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, inital-scale=1.0">
            <title>Taylor Stewart's Tough Serval || ITIS3135 || Survey</title>
            <link rel="stylesheet" href="styles/default.css">
            <link rel="icon" type="image/x-icon" href="./images/desktop.ico">
            <script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>
    </head>
    <body>
      <div data-include="./components/header.html"></div>
        <main>
            <h2>
                Survey
            </h2>
            <div class="offwhiteleft">

            <p id="description">Please take a moment to help us improve our platform by sharing your experience.</p>

            <form id="survey-form">
            
            <div>
                <label id="name-label" for="name">Name:</label>
                <input 
                type="text" 
                id="name" 
                placeholder="Enter your full name" 
                required 
                />
            </div>

            <div>
                <label id="email-label" for="email">Email:</label>
                <input 
                type="email" 
                id="email" 
                placeholder="Enter your email address" 
                required 
                />
            </div>

            <div>
                <label id="number-label" for="number">Age (optional):</label>
                <input 
                type="number" 
                id="number" 
                min="13" 
                max="120" 
                placeholder="Enter your age (13-120)" 
                />
            </div>

            <div>
                <label for="dropdown">How did you find us?</label>
                <select id="dropdown">
                <option value="" disabled selected>Select an option</option>
                <option value="search-engine">Search Engine</option>
                <option value="friend">Word of Mouth</option>
                <option value="social-media">Social Media</option>
                </select>
            </div>

            <div>
                <p>Would you recommend us to a friend?</p>
                <label>
                <input type="radio" name="recommend" value="definitely" checked /> Definitely
                </label>
                <label>
                <input type="radio" name="recommend" value="maybe" /> Maybe
                </label>
                <label>
                <input type="radio" name="recommend" value="not-sure" /> Not Sure
                </label>
            </div>

            <div>
                <p>What features did you enjoy the most? (Select all that apply)</p>
                <label>
                <input type="checkbox" value="ui-design" /> UI Design
                </label>
                <label>
                <input type="checkbox" value="speed" /> Performance Speed
                </label>
                <label>
                <input type="checkbox" value="content" /> Content Quality
                </label>
            </div>

            <div>
                <label for="comments">Additional Comments or Suggestions:</label>
                <br />
                <textarea id="comments" placeholder="Type your feedback here..." rows="3" cols="40"></textarea>
            </div>

            <div>
                <button type="submit" id="submit">Submit Form</button>
            </div>

            </form>

            </div>
        </main>
      <div data-include="./components/footer.html"></div>
    <script src="./scripts/HTMLInclude.min.js"></script>
    <script src="https://divonbriesen.github.io/web123/scripts/standards-check.js" defer></script>
    </body>
</html>
